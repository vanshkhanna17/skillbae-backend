preview = true
line-length = 88 # Optional: maximum line length (same as Black)

# Global excludes — Ruff won't touch these at all
exclude = [
    ".venv",
    "venv",
    "build",
    "dist",
    "__pycache__",
    ".mypy_cache",
    "alembic/"
]

[lint]
# Enable important built-in ruff rule categories
select = [
    "E",      # Pycodestyle errors
    "F",      # Pyflakes errors
    "ASYNC",   # Async-specific errors (this catches missing await!)
    "I"       # Import Sorting
]
# Exclude folders you never want linted
exclude = ["app/db/base.py"]

[format]
exclude = ["app/db/base.py"]
