services:
  # ── Nginx (reverse proxy) ────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80" # only port exposed to the host/internet
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro # mount config read-only
    depends_on:
      - api
    restart: unless-stopped

  # ── FastAPI App ───────────────────────────────────────────────────────────
  api:
    image: ${ECR_IMAGE} # pre-built image pulled from ECR by CD pipeline
    # NO ports block here — api:8000 is only reachable inside Docker network
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_SYNC_URL: ${DATABASE_SYNC_URL}
      SECRET_KEY: ${SECRET_KEY}
      REFRESH_TOKEN_SECRET_KEY: ${REFRESH_TOKEN_SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      COOKIE_SECURE: ${COOKIE_SECURE}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE}
      COOKIE_PATH: ${COOKIE_PATH}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      DEBUG: ${DEBUG}
      APP_NAME: ${APP_NAME}
      APP_DESCRIPTION: ${APP_DESCRIPTION}
      APP_VERSION: ${APP_VERSION}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Postgres ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:18.1-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:8.4-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 30s
      retries: 50

volumes:
  postgres_data:
