name: SkillBae Backend CI/CD
run-name: ${{ github.event_name == 'workflow_dispatch' && format('Deploy {0} → {1}', github.event.inputs.branch, github.event.inputs.environment) || github.event.head_commit.message }}

on:
  pull_request:
    branches: ["main", "staging"] # lint-and-test only

  workflow_dispatch: # manual trigger → full pipeline
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - main
      environment:
        description: "Environment to deploy to (staging branch → staging, main branch → prod)"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod

# ─────────────────────────────────────────────────────────────────────────────
# Permissions for OIDC — allows GitHub Actions to get a token from AWS
# without storing any AWS credentials as secrets
# ─────────────────────────────────────────────────────────────────────────────
permissions:
  id-token: write # required for OIDC token request
  contents: read # required to checkout the repo

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 0 — Validate branch/env pairing (workflow_dispatch only)
  # Fails fast if someone tries staging → prod or main → staging
  # ───────────────────────────────────────────────────────────────────────────
  validate-inputs:
    name: Validate Branch & Environment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Check branch/environment pairing
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          ENV="${{ github.event.inputs.environment }}"

          echo "Branch: $BRANCH"
          echo "Environment: $ENV"

          if [[ "$BRANCH" == "staging" && "$ENV" != "staging" ]]; then
            echo "❌ Invalid pairing: branch 'staging' can only deploy to environment 'staging', got '$ENV'"
            exit 1
          fi

          if [[ "$BRANCH" == "main" && "$ENV" != "prod" ]]; then
            echo "❌ Invalid pairing: branch 'main' can only deploy to environment 'prod', got '$ENV'"
            exit 1
          fi

          echo "✅ Valid pairing: $BRANCH → $ENV"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Lint & Test
  # Runs on: pull_request AND workflow_dispatch
  # ───────────────────────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    needs: [validate-inputs]
    # validate-inputs is skipped on pull_request — treat skipped as success
    if: always() && (needs.validate-inputs.result == 'success' || needs.validate-inputs.result == 'skipped')

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: skillbae_test
          POSTGRES_USER: skillbae_admin
          POSTGRES_PASSWORD: SkillBaeAdmin
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_SYNC_URL: ${{ secrets.DATABASE_SYNC_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      REFRESH_TOKEN_SECRET_KEY: ${{ secrets.REFRESH_TOKEN_SECRET_KEY }}
      ALGORITHM: ${{ secrets.ALGORITHM }}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
      REFRESH_TOKEN_EXPIRE_DAYS: ${{ secrets.REFRESH_TOKEN_EXPIRE_DAYS }}
      COOKIE_SECURE: ${{ secrets.COOKIE_SECURE }}
      COOKIE_SAMESITE: ${{ secrets.COOKIE_SAMESITE }}
      COOKIE_PATH: ${{ secrets.COOKIE_PATH }}
      COOKIE_DOMAIN: ${{ secrets.COOKIE_DOMAIN }}
      BACKEND_CORS_ORIGINS: ${{ secrets.BACKEND_CORS_ORIGINS }}
      DEBUG: ${{ secrets.DEBUG }}
      APP_NAME: ${{ secrets.APP_NAME }}
      APP_DESCRIPTION: ${{ secrets.APP_DESCRIPTION }}
      APP_VERSION: ${{ secrets.APP_VERSION }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # On workflow_dispatch check out the selected branch; on PR use default
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest tests/ -v

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build & Push to ECR
  # Runs on: workflow_dispatch only (manual deploy)
  # Waits for: lint-and-test to pass
  # ───────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment }}

    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}
      environment: ${{ steps.build.outputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ROLE_ARN }}
          aws-region: ap-south-1
          role-session-name: GitHubActions-build-${{ github.run_id }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          # Tag format: v<YYYYMMDD>.<run-number>-<environment>
          # e.g. skillbae-api:v20260522.42-staging
          #      skillbae-api:v20260522.43-prod
          BUILD_DATE=$(date -u '+%Y%m%d')
          IMAGE_TAG="v${BUILD_DATE}.${{ github.run_number }}-${ENVIRONMENT}"
          IMAGE_URI="$ECR_REGISTRY/skillbae-${ENVIRONMENT}-api-repo:$IMAGE_TAG"

          echo "Building image: $IMAGE_URI"
          docker build -t "$IMAGE_URI" .

          echo "Pushing image: $IMAGE_URI"
          docker push "$IMAGE_URI"

          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT

          echo "✅ Pushed: $IMAGE_URI"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy
  # Runs on: workflow_dispatch only
  # Waits for: build-and-push to succeed
  # Uses AWS SSM send-command — no port 22 needed, IAM controls access
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ROLE_ARN }}
          aws-region: ap-south-1
          role-session-name: GitHubActions-deploy-${{ github.run_id }}

      - name: Push compose & nginx config to EC2 via SSM
        env:
          INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
        run: |
          # Encode docker-compose.yml and nginx.conf so they can be passed
          # through SSM without any quoting or special character issues
          COMPOSE_B64=$(base64 -w0 docker-compose.yml)
          NGINX_B64=$(base64 -w0 nginx.conf)

          cat > /tmp/copy-files.sh << EOF
          #!/bin/bash
          set -e
          APP_DIR="/home/ec2-user/skillbae-backend"
          mkdir -p "\$APP_DIR/nginx"

          echo "$COMPOSE_B64" | base64 -d > "\$APP_DIR/docker-compose.yml"
          echo "$NGINX_B64"   | base64 -d > "\$APP_DIR/nginx/nginx.conf"

          chown -R ec2-user:ec2-user "\$APP_DIR"
          echo "✅ Files written to \$APP_DIR"
          EOF

          ENCODED=$(base64 -w0 /tmp/copy-files.sh)

          cat > /tmp/ssm-copy.json << ENDJSON
          {
            "InstanceIds": ["$INSTANCE_ID"],
            "DocumentName": "AWS-RunShellScript",
            "Parameters": {
              "commands": ["echo $ENCODED | base64 -d | bash"]
            }
          }
          ENDJSON

          CMD_ID=$(aws ssm send-command \
            --region ap-south-1 \
            --cli-input-json file:///tmp/ssm-copy.json \
            --query "Command.CommandId" \
            --output text)

          echo "📋 Copy command ID: $CMD_ID"

          for i in $(seq 1 12); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --region ap-south-1 \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "  Status: $STATUS (attempt $i/12)"

            if [[ "$STATUS" == "Success" ]]; then
              echo "✅ Files copied successfully"
              break
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
              echo "❌ File copy failed"
              aws ssm get-command-invocation \
                --command-id "$CMD_ID" \
                --instance-id "$INSTANCE_ID" \
                --region ap-south-1 \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
            sleep 5
          done

      - name: Deploy via SSM send-command
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          echo "🚀 Sending deploy command to EC2 instance: $INSTANCE_ID"

          # Write the deploy script to a file — avoids all shell escaping issues
          # with --parameters inline. Values are substituted via sed before encoding.
          cat > /tmp/deploy.sh << 'EOF'
          #!/bin/bash
          set -e
          IMAGE_URI="PLACEHOLDER_IMAGE_URI"
          ENVIRONMENT="PLACEHOLDER_ENVIRONMENT"

          APP_DIR="/home/ec2-user/skillbae-backend"

          # Ensure the app directory exists (files are written by the prior SSM step)
          mkdir -p "$APP_DIR"
          cd "$APP_DIR"

          echo "Authenticating with ECR..."
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws ecr get-login-password --region ap-south-1 \
            | docker login --username AWS --password-stdin \
            "${ACCOUNT_ID}.dkr.ecr.ap-south-1.amazonaws.com"

          echo "Pulling image: $IMAGE_URI"
          docker pull "$IMAGE_URI"

          echo "Fetching env vars from SSM..."
          aws ssm get-parameters-by-path \
            --path "/skillbae-${ENVIRONMENT}-api/" \
            --with-decryption \
            --region ap-south-1 \
            --query "Parameters[*].[Name,Value]" \
            --output text \
          | while IFS=$'\t' read -r name value; do
              key=$(basename "$name")
              echo "$key=$value"
            done > .env

          echo "ECR_IMAGE=$IMAGE_URI" >> .env
          echo ".env written with $(wc -l < .env) variables"

          docker compose down
          docker compose up -d --no-build

          sleep 15
          docker compose ps
          echo "Deployment to $ENVIRONMENT complete"
          EOF

          # Substitute actual values
          sed -i "s|PLACEHOLDER_IMAGE_URI|${IMAGE_URI}|g" /tmp/deploy.sh
          sed -i "s|PLACEHOLDER_ENVIRONMENT|${ENVIRONMENT}|g" /tmp/deploy.sh

          # Base64-encode the script and pass via --cli-input-json to avoid
          # all quoting/escaping issues — JSON format handles special chars cleanly
          ENCODED=$(base64 -w0 /tmp/deploy.sh)

          # Build the JSON input file — no shell quoting issues this way
          cat > /tmp/ssm-input.json << EOF
          {
            "InstanceIds": ["$INSTANCE_ID"],
            "DocumentName": "AWS-RunShellScript",
            "Parameters": {
              "commands": ["echo $ENCODED | base64 -d | bash"]
            }
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --region ap-south-1 \
            --cli-input-json file:///tmp/ssm-input.json \
            --query "Command.CommandId" \
            --output text)

          echo "📋 Command ID: $COMMAND_ID"
          echo "⏳ Waiting for command to complete..."

          # Poll until the command finishes (timeout after 5 minutes)
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region ap-south-1 \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "  Status: $STATUS (attempt $i/30)"

            if [[ "$STATUS" == "Success" ]]; then
              echo "✅ Deployment succeeded"
              # Print command output
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --region ap-south-1 \
                --query "StandardOutputContent" \
                --output text
              exit 0
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
              echo "❌ Deployment failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --region ap-south-1 \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi

            sleep 10
          done

          echo "❌ Timed out waiting for command to complete"
          exit 1
