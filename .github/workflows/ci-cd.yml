name: SkillBae Backend CI/CD
run-name: ${{ github.event_name == 'workflow_dispatch' && format('Deploy {0} → {1}{2}', github.event.inputs.branch, github.event.inputs.environment, github.event.inputs.deploy_infra == true && ' (+ infra)' || '') || github.event.head_commit.message }}

on:
  pull_request:
    branches: ["main", "staging"] # lint-and-test only

  workflow_dispatch: # manual trigger → full pipeline
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - main
      environment:
        description: "Environment to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod
      deploy_infra:
        description: "Run Terraform (provision/update infrastructure)?"
        required: true
        default: false # ✅ boolean, no quotes
        type: boolean # ✅ renders as checkbox in GitHub UI

# ─────────────────────────────────────────────────────────────────────────────
# Permissions for OIDC — allows GitHub Actions to get a token from AWS
# without storing any AWS credentials as secrets
# ─────────────────────────────────────────────────────────────────────────────
permissions:
  id-token: write # required for OIDC token request
  contents: read # required to checkout the repo
  packages: write # required for GitHub Actions cache (buildx gha backend)

env:
  AWS_REGION: "ap-south-1"
  TF_WORKING_DIR: "terraform/main"
  TERRAFORM_VERSION: "1.6.2"

concurrency:
  group: deploy-${{ github.event.inputs.environment || github.ref }}
  cancel-in-progress: false

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 0 — Validate branch/env pairing (workflow_dispatch only)
  # Fails fast if someone tries staging → prod or main → staging
  # ───────────────────────────────────────────────────────────────────────────
  validate-inputs:
    name: Validate Branch & Environment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Check branch/environment pairing
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          ENV="${{ github.event.inputs.environment }}"

          echo "Branch:        $BRANCH"
          echo "Environment:   $ENV"
          echo "Deploy infra:  ${{ github.event.inputs.deploy_infra }}"

          if [[ "$BRANCH" == "staging" && "$ENV" != "staging" ]]; then
            echo "❌ Invalid pairing: branch 'staging' can only deploy to environment 'staging', got '$ENV'"
            exit 1
          fi

          if [[ "$BRANCH" == "main" && "$ENV" != "prod" ]]; then
            echo "❌ Invalid pairing: branch 'main' can only deploy to environment 'prod', got '$ENV'"
            exit 1
          fi

          echo "✅ Valid pairing: $BRANCH → $ENV"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Lint & Test
  # Runs on: pull_request AND workflow_dispatch
  # ───────────────────────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    needs: [validate-inputs]
    # validate-inputs is skipped on pull_request — treat skipped as success
    if: always() && (needs.validate-inputs.result == 'success' || needs.validate-inputs.result == 'skipped')

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: skillbae_test
          POSTGRES_USER: skillbae_admin
          POSTGRES_PASSWORD: SkillBaeAdmin
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_SYNC_URL: ${{ secrets.DATABASE_SYNC_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      REFRESH_TOKEN_SECRET_KEY: ${{ secrets.REFRESH_TOKEN_SECRET_KEY }}
      ALGORITHM: ${{ secrets.ALGORITHM }}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
      REFRESH_TOKEN_EXPIRE_DAYS: ${{ secrets.REFRESH_TOKEN_EXPIRE_DAYS }}
      COOKIE_SECURE: ${{ secrets.COOKIE_SECURE }}
      COOKIE_SAMESITE: ${{ secrets.COOKIE_SAMESITE }}
      COOKIE_PATH: ${{ secrets.COOKIE_PATH }}
      COOKIE_DOMAIN: ${{ secrets.COOKIE_DOMAIN }}
      BACKEND_CORS_ORIGINS: ${{ secrets.BACKEND_CORS_ORIGINS }}
      DEBUG: ${{ secrets.DEBUG }}
      APP_NAME: ${{ secrets.APP_NAME }}
      APP_DESCRIPTION: ${{ secrets.APP_DESCRIPTION }}
      APP_VERSION: ${{ secrets.APP_VERSION }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # On workflow_dispatch check out the selected branch; on PR use default
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest tests/ -v

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Terraform Plan
  # Runs on: workflow_dispatch only, when deploy_infra checkbox is checked
  # ───────────────────────────────────────────────────────────────────────────
  tf-plan:
    name: "Terraform Plan (${{ github.event.inputs.environment }})"
    runs-on: ubuntu-latest
    needs: [validate-inputs]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_infra == true # ✅ boolean compare
    environment: ${{ github.event.inputs.environment }}

    defaults:
      run:
        working-directory: "terraform/main"

    outputs:
      backend-config: ${{ steps.config.outputs.backend-config }}
      var-file: ${{ steps.config.outputs.var-file }}
      workspace: ${{ steps.config.outputs.workspace }}
      aws_role: ${{ steps.config.outputs.aws_role }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set Deployment Config
        id: config
        run: |
          case "${{ github.event.inputs.environment }}" in
            staging)
              echo "backend-config=config.staging.tfbackend" >> $GITHUB_OUTPUT
              echo "var-file=staging.tfvars" >> $GITHUB_OUTPUT
              echo "aws_role=${{ vars.AWS_GITHUB_ROLE_ARN }}" >> $GITHUB_OUTPUT
              echo "workspace=staging" >> $GITHUB_OUTPUT
              ;;
            prod)
              echo "backend-config=config.prod.tfbackend" >> $GITHUB_OUTPUT
              echo "var-file=prod.tfvars" >> $GITHUB_OUTPUT
              echo "aws_role=${{ vars.AWS_GITHUB_ROLE_ARN }}" >> $GITHUB_OUTPUT
              echo "workspace=prod" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "❌ Error: Invalid environment '${{ github.event.inputs.environment }}'"
              exit 1
              ;;
          esac
          echo "✅ Deployment configuration set for ${{ github.event.inputs.environment }}"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.config.outputs.aws_role }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-tf-plan-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config=${{ steps.config.outputs.backend-config }} \
            -reconfigure
          echo "✅ Terraform initialized"

      - name: Terraform Workspace
        run: |
          WORKSPACE=${{ steps.config.outputs.workspace }}
          if terraform workspace list | grep -q "^\s*\*\?\s*${WORKSPACE}$"; then
            echo "📂 Selecting existing workspace: $WORKSPACE"
            terraform workspace select "$WORKSPACE"
          else
            echo "📂 Creating new workspace: $WORKSPACE"
            terraform workspace new "$WORKSPACE"
          fi
          CURRENT=$(terraform workspace show)
          echo "✅ Active workspace: $CURRENT"
          if [ "$CURRENT" != "$WORKSPACE" ]; then
            echo "❌ Failed to switch to workspace $WORKSPACE"
            exit 1
          fi

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: |
          terraform validate
          echo "✅ Terraform configuration valid"

      - name: Terraform Plan
        env:
          TF_VAR_postgres_password: ${{ secrets.TF_POSTGRES_PASSWORD }}
          TF_VAR_secret_key: ${{ secrets.TF_SECRET_KEY }}
          TF_VAR_refresh_token_secret_key: ${{ secrets.TF_REFRESH_TOKEN_SECRET_KEY }}
          TF_VAR_cors_origins: ${{ secrets.TF_CORS_ORIGINS }}
        run: |
          terraform plan \
            -var-file=${{ steps.config.outputs.var-file }} \
            -var="public_key=${{ secrets.TF_PUBLIC_KEY }}" \
            -out=tfplan \
            -lock-timeout=10m
          echo "✅ Terraform plan complete"

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 1

      - name: Plan Summary
        run: |
          echo "## 📋 Terraform Plan Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ github.event.inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Workspace   | \`${{ steps.config.outputs.workspace }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch      | \`${{ github.event.inputs.branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID      | \`${{ github.run_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏭️ **Next:** Approve the environment to proceed with \`terraform apply\`" >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — Terraform Apply
  # Runs on: workflow_dispatch only, when deploy_infra checkbox is checked
  # Waits for: tf-plan (and implicitly lint-and-test via job ordering)
  # ───────────────────────────────────────────────────────────────────────────
  tf-apply:
    name: "Terraform Apply (${{ github.event.inputs.environment }})"
    runs-on: ubuntu-latest
    needs: [lint-and-test, tf-plan]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_infra == true # ✅ boolean compare
    environment: ${{ github.event.inputs.environment }}
    timeout-minutes: 30

    defaults:
      run:
        working-directory: "terraform/main"

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.tf-plan.outputs.aws_role }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-tf-apply-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config=${{ needs.tf-plan.outputs.backend-config }} \
            -reconfigure
          echo "✅ Terraform initialized"

      - name: Select Terraform Workspace
        run: |
          WORKSPACE="${{ needs.tf-plan.outputs.workspace }}"
          echo "📂 Selecting workspace: $WORKSPACE"
          terraform workspace select "$WORKSPACE"
          CURRENT=$(terraform workspace show)
          echo "✅ Active workspace: $CURRENT"
          if [ "$CURRENT" != "$WORKSPACE" ]; then
            echo "❌ Failed to switch to workspace $WORKSPACE"
            exit 1
          fi

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve -lock-timeout=10m tfplan
          echo "✅ Infrastructure deployed"

      - name: Capture Terraform Outputs
        id: tf-outputs
        run: |
          EC2_PUBLIC_IP=$(terraform output -raw ec2_public_ip)
          EC2_INSTANCE_ID=$(terraform output -raw ec2_instance_id)
          ECR_REPO_URL=$(terraform output -raw ecr_repository_url)
          CLOUDFRONT_URL=$(terraform output -raw api_cloudfront_url)

          echo "ec2_public_ip=$EC2_PUBLIC_IP"       >> $GITHUB_OUTPUT
          echo "ec2_instance_id=$EC2_INSTANCE_ID"   >> $GITHUB_OUTPUT
          echo "ecr_repo_url=$ECR_REPO_URL"         >> $GITHUB_OUTPUT
          echo "cloudfront_url=$CLOUDFRONT_URL"     >> $GITHUB_OUTPUT

          echo "✅ EC2 Public IP:    $EC2_PUBLIC_IP"
          echo "✅ EC2 Instance ID:  $EC2_INSTANCE_ID"
          echo "✅ ECR Repo URL:     $ECR_REPO_URL"
          echo "✅ CloudFront URL:   $CLOUDFRONT_URL"

      - name: Infra Summary
        run: |
          echo "## 🏗️ Terraform Apply Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource        | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| EC2 Public IP   | \`${{ steps.tf-outputs.outputs.ec2_public_ip }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| EC2 Instance ID | \`${{ steps.tf-outputs.outputs.ec2_instance_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ECR Repo URL    | \`${{ steps.tf-outputs.outputs.ecr_repo_url }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| CloudFront URL  | \`${{ steps.tf-outputs.outputs.cloudfront_url }}\` |" >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 — Build & Push to ECR
  # Runs on: workflow_dispatch only
  # Waits for: tf-apply (if deploy_infra=true) OR lint-and-test (if skipped)
  # ───────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [lint-and-test, tf-apply]
    if: |
      github.event_name == 'workflow_dispatch' &&
      needs.lint-and-test.result == 'success' &&
      (needs.tf-apply.result == 'success' || needs.tf-apply.result == 'skipped')
    environment: ${{ github.event.inputs.environment }}
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}
      environment: ${{ steps.build.outputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-build-${{ github.run_id }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          # Tag format: v<YYYYMMDD>.<run-number>-<environment>
          # e.g. skillbae-api:v20260522.42-staging
          #      skillbae-api:v20260522.43-prod
          BUILD_DATE=$(date -u '+%Y%m%d')
          IMAGE_TAG="v${BUILD_DATE}.${{ github.run_number }}-${ENVIRONMENT}"
          IMAGE_URI="$ECR_REGISTRY/skillbae-${ENVIRONMENT}-api-repo:$IMAGE_TAG"

          echo "Building image: $IMAGE_URI"
          docker buildx build \
            --platform linux/arm64 \
            --load \
            --cache-from type=gha \
            --cache-to   type=gha,mode=max \
            -t "$IMAGE_URI" \
            .

          echo "Pushing image: $IMAGE_URI"
          docker push "$IMAGE_URI"

          echo "image_uri=$IMAGE_URI"       >> $GITHUB_OUTPUT
          echo "environment=$ENVIRONMENT"   >> $GITHUB_OUTPUT
          echo "✅ Pushed: $IMAGE_URI"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5 — Deploy to EC2 via SSM
  # Runs on: workflow_dispatch only
  # Waits for: build-and-push to succeed
  # Uses AWS SSM send-command — no port 22 needed, IAM controls access
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-deploy-${{ github.run_id }}

      - name: Push compose & nginx config to EC2 via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          # Encode docker-compose.yml and nginx.conf so they can be passed
          # through SSM without any quoting or special character issues
          COMPOSE_B64=$(base64 -w0 docker-compose.yml)
          NGINX_B64=$(base64 -w0 nginx.conf)

          cat > /tmp/copy-files.sh << EOF
          #!/bin/bash
          set -e
          APP_DIR="/home/ec2-user/skillbae-backend"
          mkdir -p "\$APP_DIR/nginx"

          echo "$COMPOSE_B64" | base64 -d > "\$APP_DIR/docker-compose.yml"
          echo "$NGINX_B64"   | base64 -d > "\$APP_DIR/nginx/nginx.conf"

          chown -R ec2-user:ec2-user "\$APP_DIR"
          echo "✅ Files written to \$APP_DIR"
          EOF

          ENCODED=$(base64 -w0 /tmp/copy-files.sh)

          cat > /tmp/ssm-copy.json << ENDJSON
          {
            "InstanceIds": ["$INSTANCE_ID"],
            "DocumentName": "AWS-RunShellScript",
            "Parameters": {
              "commands": ["echo $ENCODED | base64 -d | bash"]
            }
          }
          ENDJSON

          CMD_ID=$(aws ssm send-command \
            --region ${{ env.AWS_REGION }} \
            --cli-input-json file:///tmp/ssm-copy.json \
            --query "Command.CommandId" \
            --output text)

          echo "📋 Copy command ID: $CMD_ID"

          for i in $(seq 1 12); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --region ${{ env.AWS_REGION }} \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "  Status: $STATUS (attempt $i/12)"

            if [[ "$STATUS" == "Success" ]]; then
              echo "✅ Files copied successfully"
              break
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
              echo "❌ File copy failed"
              aws ssm get-command-invocation \
                --command-id "$CMD_ID" \
                --instance-id "$INSTANCE_ID" \
                --region ${{ env.AWS_REGION }} \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
            sleep 5
          done

      - name: Deploy via SSM send-command
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          echo "🚀 Sending deploy command to EC2 instance: $INSTANCE_ID"

          # Write the deploy script to a file — avoids all shell escaping issues
          # with --parameters inline. Values are substituted via sed before encoding.

          cat > /tmp/deploy.sh << 'EOF'
          #!/bin/bash
          set -e
          IMAGE_URI="PLACEHOLDER_IMAGE_URI"
          ENVIRONMENT="PLACEHOLDER_ENVIRONMENT"

          APP_DIR="/home/ec2-user/skillbae-backend"

          # Ensure the app directory exists (files are written by the prior SSM step)
          mkdir -p "$APP_DIR"
          cd "$APP_DIR"

          echo "Authenticating with ECR..."
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws ecr get-login-password --region ap-south-1 \
            | docker login --username AWS --password-stdin \
            "${ACCOUNT_ID}.dkr.ecr.ap-south-1.amazonaws.com"

          echo "Pulling image: $IMAGE_URI"
          docker pull "$IMAGE_URI"

          echo "Fetching env vars from SSM Parameter Store..."
          aws ssm get-parameters-by-path \
            --path "/skillbae-${ENVIRONMENT}-api/" \
            --with-decryption \
            --region ap-south-1 \
            --query "Parameters[*].[Name,Value]" \
            --output text \
          | while IFS=$'\t' read -r name value; do
              key=$(basename "$name")
              echo "$key=$value"
            done > .env

          echo "ECR_IMAGE=$IMAGE_URI" >> .env
          echo ".env written with $(wc -l < .env) variables"

          docker compose down
          docker compose up -d --no-build

          sleep 15
          docker compose ps
          echo "✅ Deployment to $ENVIRONMENT complete"
          EOF

          # Substitute actual values
          sed -i "s|PLACEHOLDER_IMAGE_URI|${IMAGE_URI}|g" /tmp/deploy.sh
          sed -i "s|PLACEHOLDER_ENVIRONMENT|${ENVIRONMENT}|g" /tmp/deploy.sh

          # Base64-encode the script and pass via --cli-input-json to avoid
          # all quoting/escaping issues — JSON format handles special chars cleanly
          ENCODED=$(base64 -w0 /tmp/deploy.sh)

          # Build the JSON input file — no shell quoting issues this way
          cat > /tmp/ssm-input.json << EOF
          {
            "InstanceIds": ["$INSTANCE_ID"],
            "DocumentName": "AWS-RunShellScript",
            "Parameters": {
              "commands": ["echo $ENCODED | base64 -d | bash"]
            }
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --region ${{ env.AWS_REGION }} \
            --cli-input-json file:///tmp/ssm-input.json \
            --query "Command.CommandId" \
            --output text)

          echo "📋 Command ID: $COMMAND_ID"
          echo "⏳ Waiting for command to complete..."

          # Poll until the command finishes (timeout after 5 minutes)
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region ${{ env.AWS_REGION }} \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "  Status: $STATUS (attempt $i/30)"

            if [[ "$STATUS" == "Success" ]]; then
              echo "✅ Deployment succeeded"
              # Print command output
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --region ${{ env.AWS_REGION }} \
                --query "StandardOutputContent" \
                --output text
              exit 0
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
              echo "❌ Deployment failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --region ${{ env.AWS_REGION }} \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi

            sleep 10
          done

          echo "❌ Timed out waiting for command to complete"
          exit 1

      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key             | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment     | \`${{ github.event.inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch          | \`${{ github.event.inputs.branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image           | \`${{ needs.build-and-push.outputs.image_uri }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Infra Updated   | \`${{ github.event.inputs.deploy_infra }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID          | \`${{ github.run_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Deployed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')**" >> $GITHUB_STEP_SUMMARY
