name: Terraform Infra deployment

run-name: "Deploy branch: ${{ github.event.inputs.branch }} → env: ${{ github.event.inputs.environment }}"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: "staging"
        type: choice
        options:
          - "staging"
          - "main"
      environment:
        description: Environment to deploy
        required: true
        default: "staging"
        type: choice
        options:
          - "staging"
          - "prod"

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  WORKING_DIR: "terraform/main"
  AWS_REGION: "ap-south-1"
  TERRAFORM_VERSION: "1.6.2"

jobs:
  validate_environment:
    name: Validate Environment to deploy
    runs-on: ubuntu-latest
    steps:
      - name: Block disallowed env-branch combination for deployment
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.branch }}" == "staging" && "${{ github.event.inputs.environment }}" != "staging" ]]; then
            echo "❌ Error: Branch 'staging' can only be deployed to the 'staging' environment."
            exit 1
          fi

          if [[ "${{ github.event.inputs.branch }}" == "main" && "${{ github.event.inputs.environment }}" != "prod" ]]; then
            echo "❌ Error: Branch 'main' can only be deployed to the 'prod' environment."
            exit 1
          fi

          echo "✅ Validation passed: branch '${{ github.event.inputs.branch }}' → environment '${{ github.event.inputs.environment }}'."

  plan:
    name: Plan for ${{github.event.inputs.environment}} deployment
    runs-on: ubuntu-latest
    needs: validate_environment
    environment: ${{github.event.inputs.environment}}

    defaults:
      run:
        working-directory: "terraform/main"

    outputs:
      backend-config: ${{steps.config.outputs.backend-config}}
      var-file: ${{steps.config.outputs.var-file}}
      workspace: ${{steps.config.outputs.workspace}}
      aws_role: ${{steps.config.outputs.aws_role}}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: ${{github.event.inputs.branch}}

      - name: Set Deployment Config
        id: config
        run: |
          case "${{github.event.inputs.environment}}" in
            staging)
              echo "backend-config=config.staging.tfbackend" >> $GITHUB_OUTPUT
              echo "var-file=staging.tfvars" >> $GITHUB_OUTPUT
              echo "aws_role=${{vars.AWS_GITHUB_ROLE_ARN}}" >> $GITHUB_OUTPUT
              echo "workspace=staging" >> $GITHUB_OUTPUT
              ;;
            prod)
              echo "backend-config=config.prod.tfbackend" >> $GITHUB_OUTPUT
              echo "var-file=prod.tfvars" >> $GITHUB_OUTPUT
              echo "aws_role=${{vars.AWS_GITHUB_ROLE_ARN}}" >> $GITHUB_OUTPUT
              echo "workspace=prod" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "❌ Error: Invalid environment '${{ github.event.inputs.environment }}'"
              exit 1
              ;;
            esac
            echo "✅ Deployment configuration set for ${{ github.event.inputs.environment }}"

      - name: Debug role ARN
        run: |
          echo "Role ARN length: ${#ROLE_ARN}"
        env:
          ROLE_ARN: ${{ steps.config.outputs.aws_role }}

      - name: Configure Aws Creds (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.config.outputs.aws_role }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.event.inputs.environment }}-${{ github.run_id }}

      - name: Get AWS Account ID
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "✅ AWS Account ID: $ACCOUNT_ID"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform-version: ${{ env.TERRAFORM_VERSION }}
          terraform-wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
          -backend-config=${{steps.config.outputs.backend-config}} \
          -reconfigure
          echo "✅ Terraform initialized"

      - name: Terraform Workspace selection
        working-directory: ${{env.WORKING_DIR}}
        run: |
          WORKSPACE=${{steps.config.outputs.workspace}}

          if terraform workspace list | grep -q "^\s*\*\?\s*${WORKSPACE}$"; then
            echo "📂 Selecting existing workspace: $WORKSPACE"
            terraform workspace select "$WORKSPACE"
          else
            echo "📂 Creating new workspace: $WORKSPACE"
            terraform workspace new "$WORKSPACE"
          fi

          CURRENT=$(terraform workspace show)
          echo "✅ Active workspace: $CURRENT"

          if [ "$CURRENT" != "$WORKSPACE" ]; then
            echo "❌ Failed to switch to workspace $WORKSPACE"
            exit 1
          fi

      - name: Terraform Format Check
        working-directory: ${{env.WORKING_DIR}}
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: ${{env.WORKING_DIR}}
        run: |
          terraform validate
          echo "✅ Terraform configuration valid"

      - name: Terraform plan
        working-directory: ${{env.WORKING_DIR}}
        run: |
          terraform plan -var-file=${{steps.config.outputs.var-file}} \
          -var="public_key=${{ secrets.TF_PUBLIC_KEY }}" \
          -out=tfplan -lock-timeout=10m
          echo "✅ Terraform plan complete"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{github.event.inputs.environment}}-${{github.run_id}}
          path: ${{env.WORKING_DIR}}/tfplan
          retention-days: 1

      - name: Plan Summary
        run: |
          echo "## 📋 Terraform Plan Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Details" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ github.event.inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Workspace | \`${{ steps.config.outputs.workspace }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.event.inputs.branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | \`${{ github.run_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏭️ **Next Step:** Review the plan and approve within 10 minutes to proceed with deployment" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy for ${{github.event.inputs.environment}}
    runs-on: ubuntu-latest
    needs: plan
    environment: ${{github.event.inputs.environment}}
    timeout-minutes: 10

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Configure Aws Creds (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.plan.outputs.aws_role }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.event.inputs.environment }}-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform-version: ${{ env.TERRAFORM_VERSION }}
          terraform-wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
          -backend-config=${{needs.plan.outputs.backend-config}} \
          -reconfigure
          echo "✅ Terraform initialized"

      - name: Select TF workspace
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          WORKSPACE="${{ needs.plan.outputs.workspace }}"
          echo "📂 Selecting workspace: $WORKSPACE"
          terraform workspace select "$WORKSPACE"

          CURRENT=$(terraform workspace show)
          echo "✅ Active workspace: $CURRENT"

          if [ "$CURRENT" != "$WORKSPACE" ]; then
            echo "❌ Failed to switch to workspace $WORKSPACE"
            exit 1
          fi

      - name: Download TF plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{github.event.inputs.environment}}-${{github.run_id}}
          path: ${{env.WORKING_DIR}}

      - name: Terraform Apply
        working-directory: ${{env.WORKING_DIR}}
        run: |
          terraform apply -auto-approve -lock-timeout=10m tfplan
          echo "✅ Infrastructure deployed"

      - name: Capture TF outputs
        id: outputs
        working-directory: ${{env.WORKING_DIR}}
        run: |
          EC2_PUBLIC_IP=$(terraform output -raw ec2_public_ip)
          EC2_PUBLIC_DNS=$(terraform output -raw ec2_public_dns)

          echo "ec2_public_ip=$EC2_PUBLIC_IP" >> $GITHUB_OUTPUT
          echo "ec2_public_dns=$EC2_PUBLIC_DNS" >> $GITHUB_OUTPUT

          echo "✅ EC2 Public IP: $EC2_PUBLIC_IP"
          echo "✅ EC2 Public DNS: $EC2_PUBLIC_DNS"

      - name: Deployment Summary
        run: |
          echo "## 🚀 Terraform Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ github.event.inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Workspace | \`${{ needs.plan.outputs.workspace }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.event.inputs.branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | \`${{ github.run_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Infrastructure Outputs" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| EC2 Public IP | \`${{ steps.outputs.outputs.ec2_public_ip }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| EC2 Public DNS | \`${{ steps.outputs.outputs.ec2_public_dns }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Deployment completed successfully at $(date -u '+%Y-%m-%d %H:%M:%S UTC')**" >> $GITHUB_STEP_SUMMARY
