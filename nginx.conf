events {
    worker_connections 1024;
}

http {

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Upstream ──────────────────────────────────────────────────────────────
    # "api" is the docker-compose service name — Docker resolves it internally
    # Port 8000 is reachable inside the Docker network but NOT exposed to host
    upstream skillbae_api {
        server api:8000;
    }

    # ── Server Block ──────────────────────────────────────────────────────────
    server {
        listen 80;

        # ── Proxy Settings ────────────────────────────────────────────────────
        # Pass all requests through to FastAPI
        location / {
            proxy_pass         http://skillbae_api;

            # Tell FastAPI the real client IP and protocol
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts — increase if your endpoints are slow (e.g. file uploads)
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── Health Check Endpoint ─────────────────────────────────────────────
        # Nginx responds directly — no need to hit FastAPI for infra health checks
        location /nginx-health {
            access_log off;
            return 200 "nginx ok\n";
            add_header Content-Type text/plain;
        }
    }
}